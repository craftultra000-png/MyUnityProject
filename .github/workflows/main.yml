name: Super Clean Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (The Big Clean)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false # نترك الأندرويد لأننا نحتاجه للبناء

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unity Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.craftultra000@gmail.com }}
          UNITY_PASSWORD: ${{ secrets.mohamd86645024 }}
        with:
          targetPlatform: Android
          unityVersion: 2022.3.62f2
          androidExportType: 'androidPackage'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Game-APK
          path: build/Android
          
