name: Unity License Finder
on: [push, workflow_dispatch]
jobs:
  get_license:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate ALF
        run: |
          docker run --rm \
          -v "$(pwd):/project" \
          unityci/editor:ubuntu-2022.3.62f2-android-3.1.0 \
          unity-editor \
          -batchmode \
          -nographics \
          -createManualActivationFile \
          -logfile /dev/stdout

      - name: Inspect Logs
        run: ls -R
        

  build:
    needs: activation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unity Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          unityVersion: 2022.3.62f2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Game-APK
          path: build/Android
          
