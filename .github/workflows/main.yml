name: Force Get License XML
on: [push, workflow_dispatch]
jobs:
  get_xml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Generate ALF Text
        run: |
          docker run --rm -v "$(pwd):/project" unityci/editor:ubuntu-2022.3.62f2-android-3.1.0 \
          unity-editor -batchmode -nographics -createManualActivationFile -logfile /dev/stdout
