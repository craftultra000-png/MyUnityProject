name: Direct License Finder
on: [push, workflow_dispatch]

jobs:
  get_alf:
    runs-on: ubuntu-latest
    steps:
      - name: Free Space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Generate ALF to Console
        run: |
          docker run --rm \
          -v "$(pwd):/project" \
          unityci/editor:ubuntu-2022.3.62f2-android-3.1.0 \
          unity-editor \
          -batchmode \
          -nographics \
          -createManualActivationFile \
          -logfile /dev/stdout | tee unity_log.txt

      - name: Extract XML from Log
        run: |
          grep -oP '(?<=<UnifiedLicenseRequest>).*?(?=</UnifiedLicenseRequest>)' unity_log.txt || cat unity_log.txt
          echo "Look for the XML block above!"
