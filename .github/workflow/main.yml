
name: Get Unity License
on: [push]
jobs:
  get_alf:
    runs-on: ubuntu-latest
    steps:
      - name: Request Activation File
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 2022.3.62f2
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MyLicenseRequest
          path: ./*.alf
          
